        <main class="main">
            <div class="container">
                <h2 class="h2-title">
                    Kontaktfeld
                </h2>
                <div class="contact-field">
                    <div class="first-and-lastname-div">
                        <div class="firstname-div">
                            <label class="label firstname-label" for="firstname">
                                Vorname
                            </label>
                            <input id="firstname" type="text">
                        </div>
                        <div class="lastname-div">
                            <label class="label lastname-label" for="lastname">
                                Nachname
                            </label>
                            <input id="lastname" type="text">
                        </div>
                    </div>
                    <div class="subject-div">
                        <label class="label subject-label" for="subject">
                            Betreff
                        </label>
                        <input id="subject" type="text">
                    </div>
                    <div class="message-div">
                        <label class="label message-span" for="message">
                            Nachricht
                        </label>
                        <textarea class="message" id="message" name="message"></textarea>
                    </div>
                    <div class="send-btn-div">
                        <button class="send-btn" onclick="sendForm()" id="send-btn">
                            <span class="send-span">Senden</span>
                        </button>
                    </div>
                </div>
            </div>
